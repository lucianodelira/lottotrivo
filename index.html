  <script>
    const menu = document.getElementById('menu-hamburguer');
    const botoesContainer = document.getElementById('botoes-container');

    function toggleMenu() {
      const aberto = menu.classList.toggle('open');
      if (aberto) {
        botoesContainer.classList.add('open');
      } else {
        botoesContainer.classList.remove('open');
      }
    }

    menu.addEventListener('click', toggleMenu);

    // Permitir abrir/fechar com Enter ou Espaço para acessibilidade
    menu.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        toggleMenu();
      }
    });

    // Eventos dos botões
    document.getElementById("botao-bola").addEventListener("click", function () {
      window.location.href = "https://www.brasileirao.site";
    });

    document.getElementById("botao-tigerclub").addEventListener("click", function () {
      window.open("https://app.superacertos.club/pr/DiNatQPp", "_blank");
    });
    document.getElementById("botao-acertosclub").addEventListener("click", function () {
      window.open("https://app.acertos.club/pr/qcGoRMK0", "_blank");
    });
    document.getElementById("botao-acertos").addEventListener("click", function () {

    });
    document.getElementById("botao-brasil").addEventListener("click", function () {
      window.open("https://www.youtube.com/@acertosclub", "_blank");
    });

    // Service Worker e instalação do app
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js')
        .then(reg => console.log('[SW] Registrado com sucesso!', reg))
        .catch(err => console.error('[SW] Erro ao registrar:', err));
    }

    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      if (!localStorage.getItem('appInstalado')) {
        document.getElementById('install-banner').style.display = 'block';
      }
    });

    function instalarApp() {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then((choiceResult) => {
          if (choiceResult.outcome === 'accepted') {
            console.log('Usuário aceitou instalar o app');
            localStorage.setItem('appInstalado', 'true');
          } else {
            console.log('Usuário recusou instalar o app');
          }
          document.getElementById('install-banner').style.display = 'none';
          deferredPrompt = null;
        });
      } else {
        alert("Você já instalou ou ainda não pode instalar.");
      }
    }
  </script>

<script>
  // Função exclusiva para fechar só esse banner
  function fecharWhatsBanner() {
    document.getElementById("whatsapp-banner").style.display = "none";
  }

  // Função para verificar se já foi exibido hoje
  function podeMostrarWhatsBanner() {
    const hoje = new Date().toISOString().split('T')[0]; // formato AAAA-MM-DD
    const ultimoDia = localStorage.getItem("whatsBannerDia");
    return ultimoDia !== hoje;
  }

  // Exibir banner depois de 5 segundos (5000 ms), se não exibiu hoje
  setTimeout(() => {
    if (podeMostrarWhatsBanner()) {
      document.getElementById("whatsapp-banner").style.display = "flex";
      localStorage.setItem("whatsBannerDia", new Date().toISOString().split('T')[0]);
    }
  }, 5000);
